<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>作品走廊</title>
    <link rel="stylesheet" href="style.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div class="hud">
      <div class="hud-title">今天的<em>作品</em>走廊</div>
      <div class="hud-meta">
        <span class="pulse-dot"></span>
        <span id="count-label">即時更新中</span>
      </div>
      <div class="hud-hint" id="hud-hint">WASD 移動、滑鼠拖曳視角・點擊作品查看</div>
    </div>

    <canvas id="scene"></canvas>

    <div class="lock-prompt" id="lock-prompt">
      <div class="lock-prompt-box">
        <div class="lock-prompt-title">點擊進入導覽模式</div>
        <div class="lock-prompt-sub">WASD 移動・滑鼠看向兩側・點擊作品查看內容・Esc 離開</div>
      </div>
    </div>

    <div class="empty-state hidden" id="empty-state">
      <span class="big">還沒有人上傳作品</span>
      掃描 QR code，成為第一個掛上牆的人
    </div>

    <div class="modal hidden" id="modal">
      <button class="modal-close" id="modal-close" aria-label="關閉">✕</button>
      <div class="modal-content" id="modal-content"></div>
    </div>

    <script type="module" src="app-gallery.js"></script>
  </body>
</html>
