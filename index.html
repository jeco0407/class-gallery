<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>作品走廊</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
    }
  }
</script>
</head>
<body>

<canvas id="scene"></canvas>

<aside id="sidebar">
  <div id="logo">YONG HAO</div>
  <div class="side-label">GALLERY</div>
  <div class="side-count" id="count-label">即時更新中</div>
  <nav id="sections"></nav>
  <div class="side-foot">
    <button class="foot-btn" id="soundBtn">
      <svg viewBox="0 0 24 24"><path d="M11 5 6 9H3v6h3l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/></svg>
      <span class="lbl">SOUND</span> <span class="state" id="soundState">OFF</span>
    </button>
    <button class="foot-btn" id="fsBtn">
      <svg viewBox="0 0 24 24"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg>
      <span class="lbl">FULLSCREEN</span>
    </button>
  </div>
</aside>

<nav id="topnav">
  <div id="menu-dot"><span></span></div>
  <div id="menu-panel" class="hidden">
    <a href="upload.html">上傳作品</a>
    <a href="admin.html">管理者</a>
  </div>
</nav>

<div id="reticle"></div>
<div id="artcard">
  <div class="t"></div><div class="y"></div><div class="m"></div><div class="likes"></div><div class="more">MORE</div>
</div>

<div id="hint"><span>W A S D 移動</span><i></i><span>拖 曳 畫 面 轉 視 角</span></div>

<div id="pad">
  <div class="pkey" id="k-up"><svg viewBox="0 0 24 24"><path d="m6 14 6-6 6 6"/></svg></div>
  <div class="pkey" id="k-left"><svg viewBox="0 0 24 24"><path d="m14 6-6 6 6 6"/></svg></div>
  <div class="pkey" id="k-down"><svg viewBox="0 0 24 24"><path d="m6 10 6 6 6-6"/></svg></div>
  <div class="pkey" id="k-right"><svg viewBox="0 0 24 24"><path d="m10 6 6 6-6 6"/></svg></div>
</div>

<div id="minimapBox"><canvas id="minimap" width="380" height="240"></canvas></div>

<div class="empty-state hidden" id="empty-state">
  <span class="big">還沒有人上傳作品</span>
  掃描 QR code，成為第一個掛上牆的人
</div>

<div id="modal">
  <button class="close" id="modalClose">✕</button>
  <div class="wrap">
    <img id="mImg" alt="">
    <div class="info">
      <div class="eyebrow" id="mSec"></div>
      <h2 id="mTitle"></h2>
      <div class="meta" id="mMeta"></div>
      <div class="desc" id="mDesc"></div>
      <div class="like-row">
        <button id="mLike" class="like-btn" type="button">
          <svg viewBox="0 0 24 24"><path d="M12 21s-7.5-4.6-10-9.3C.5 8 2 4 6 4c2.1 0 3.6 1.2 4.5 2.6C11.4 5.2 12.9 4 15 4c4 0 5.5 4 4 7.7C19.5 16.4 12 21 12 21z"/></svg>
          <span id="mLikeCount">0</span>
        </button>
      </div>
      <a class="mlink hidden" id="mLink" target="_blank" rel="noopener noreferrer">在新分頁開啟網站 →</a>
    </div>
  </div>
</div>

<div id="intro">
  <div class="door dl"></div>
  <div class="door dr"></div>
  <div class="stage">
    <div class="corner c-tl">Portfolio Gallery<br><span>互動式作品走廊</span></div>
    <div class="corner c-tr" id="cornerWorks">即時更新中<br><span>2 Sections</span></div>
    <div class="corner c-bl">First-Person<br><span>WASD 移動 · 拖曳轉視角</span></div>
    <div class="corner c-br">Sound<br><span>建議開啟聲音</span></div>
    <div class="mid">
      <div class="eyebrow">2026 COLLECTION</div>
      <h1 id="introTitle" aria-label="YONG HAO"></h1>
      <div class="rule"></div>
      <div class="zh">今天的作品走廊</div>
      <div class="en">AN IMMERSIVE PORTFOLIO EXPERIENCE</div>
      <div class="enter-ring">
        <svg viewBox="0 0 106 106"><circle cx="53" cy="53" r="51"/></svg>
        <span>進 入<br><em>ENTER</em></span>
      </div>
    </div>
    <div class="secline" id="introSecs"></div>
  </div>
</div>

<script type="module" src="app-gallery.js"></script>
</body>
</html>
